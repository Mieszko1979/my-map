<!DOCTYPE html>
<html>
<head>
    <title>Карта путешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <!-- ПОДКЛЮЧАЕМ ВАШ ДНЕВНИК -->
    <script src="points.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { width: 100vw; height: 100vh; }
        .my-popup { font-family: Arial, sans-serif; font-size: 14px; text-align: center; line-height: 1.5; }
        .my-popup a { display: block; margin-top: 10px; color: #238aff; text-decoration: none; font-weight: bold; border: 1px solid #238aff; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([55, 37], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // ЦИКЛ: Берет каждую точку из файла points.js и ставит на карту
        myPoints.forEach(function(point) {
            var marker = L.marker([point.lat, point.lng]).addTo(map);
            var content = `
                <div class="my-popup">
                    <b>${point.title}</b><br>
                    ${point.desc}<br>
                    <a href="${point.link}" target="_blank">Посмотреть в Komoot</a>
                </div>`;
            marker.bindPopup(content);
            marker.on('mouseover', function (e) { this.openPopup(); });
        });

        // Загрузка трека (если файла нет в папке, карта просто покажет точки)
        new L.GPX('track.gpx', { async: true, polyline_options: { color: 'blue', weight: 3 } })
            .on('loaded', function(e) { map.fitBounds(e.target.getBounds()); })
            .addTo(map);
    </script>
</body>
</html>
