<!DOCTYPE html>
<html>
<head>
    <title>Карта велопутешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="points.js"></script>
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .day-marker {
            background: white; border: 2px solid red; border-radius: 50%;
            color: black; font-weight: bold; font-family: Arial;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 13px;
        }
        .popup-box { text-align: center; font-family: sans-serif; min-width: 160px; }
        .popup-box b { font-size: 16px; display: block; margin-bottom: 5px; }
        .btn-view {
            display: inline-block; background: #4285F4; color: white !important;
            text-decoration: none; padding: 12px 25px; border-radius: 25px;
            margin-top: 10px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {zoomControl: false}).setView([50, 80], 4);
        L.control.zoom({position: 'bottomright'}).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        if (typeof myPoints !== 'undefined' && myPoints.length > 0) {
            myPoints.forEach(function(p, i) {
                var icon = L.divIcon({ className: 'day-marker', html: (i + 1), iconSize: [26, 26], iconAnchor: [13, 13] });
                
                // Ссылка ведет на наш специальный просмотрщик спутника
                var viewUrl = "view.html?file=" + p.link;

                var popupHtml = '<div class="popup-box">' +
                               '<b>' + p.title + '</b>' +
                               '<span>' + p.desc + '</span><br>' +
                               '<a href="' + viewUrl + '" class="btn-view" target="_blank">Спутник</a>' +
                               '</div>';

                L.marker([p.lat, p.lng], {icon: icon}).addTo(map).bindPopup(popupHtml);
            });

            var last = myPoints[myPoints.length - 1];
            map.setView([last.lat, last.lng], 8);
        }
    </script>
</body>
</html>
