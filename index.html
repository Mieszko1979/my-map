<!DOCTYPE html>
<html>
<head>
    <title>Мои Велопутешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Плагин для чтения GPX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="points.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #menu-box {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 12px; border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); font-family: Arial, sans-serif;
            min-width: 230px;
        }
        .menu-title { font-weight: bold; display: flex; align-items: center; cursor: pointer; font-size: 15px; }
        .menu-title input { margin-right: 10px; transform: scale(1.2); }
        #trip-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; display: none; }
        .trip-item { margin-bottom: 10px; display: flex; align-items: center; font-size: 13px; }
        .trip-item input { margin-right: 10px; cursor: pointer; }

        .day-marker {
            background: #fff; border: 2px solid #28a745; border-radius: 50%;
            color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 11px;
        }
        /* Архивные точки - СИНИЕ */
        .day-marker.archive { border-color: #007bff; color: #007bff; }
    </style>
</head>
<body>

    <div id="menu-box">
        <div class="menu-title" onclick="document.getElementById('main-toggle').click()">
            <input type="checkbox" id="main-toggle" onclick="event.stopPropagation()" onchange="toggleList()">
            Мои велопутешествия
        </div>
        <div id="trip-list">
            <div class="trip-item"><input type="checkbox" onchange="loadGPX(this, 'archive/2018/2018.gpx', 'a2018')"> 1. Яранск - Паттайя 2018</div>
            <div class="trip-item"><input type="checkbox" onchange="loadGPX(this, 'archive/2019/2019.gpx', 'a2019')"> 2. Путешествие 2019</div>
            <div class="trip-item"><input type="checkbox" onchange="loadGPX(this, 'archive/2024/2024.gpx', 'a2024')"> 3. Путешествие 2024</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([50, 80], 4);
        map.attributionControl.setPrefix('Мое велопутешествие');
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        var archiveLayers = {};

        // ФУНКЦИЯ ЗАГРУЗКИ АРХИВНОГО GPX
        function loadGPX(checkbox, fileUrl, id) {
            if (checkbox.checked) {
                var counter = 1;
                var gpx = new L.GPX(fileUrl, {
                    async: true,
                    marker_options: {
                        startIconUrl: null, endIconUrl: null, shadowUrl: null,
                        wptIconUrls: { '': null } // Убираем стандартные иконки
                    },
                    polyline_options: { color: '#007bff', weight: 2, opacity: 0.5 }
                }).on('addpoint', function(e) {
                    // Для каждой путевой точки из GPX создаем наш синий кружок
                    if (e.point_type === 'waypoint') {
                        var icon = L.divIcon({
                            className: 'day-marker archive',
                            html: counter++,
                            iconSize: [26, 26],
                            iconAnchor: [13, 13]
                        });
                        e.point.setIcon(icon);
                        
                        // В бабл вставляем название точки из GPX
                        var name = e.point_name || "Точка";
                        var comment = e.point_desc || "";
                        e.point.bindPopup("<div style='text-align:center;'><b>" + name + "</b><br>" + comment + "</div>");
                    }
                }).on('loaded', function(e) {
                    map.fitBounds(e.target.getBounds());
                }).addTo(map);

                archiveLayers[id] = gpx;
            } else {
                if (archiveLayers[id]) { map.removeLayer(archiveLayers[id]); delete archiveLayers[id]; }
            }
        }

        function toggleList() {
            var main = document.getElementById('main-toggle');
            document.getElementById('trip-list').style.display = main.checked ? 'block' : 'none';
            if (!main.checked) {
                for (var key in archiveLayers) { map.removeLayer(archiveLayers[key]); }
                archiveLayers = {};
                document.querySelectorAll('#trip-list input').forEach(i => i.checked = false);
            }
        }

        // ТЕКУЩИЙ ПОХОД (Зеленый) - остается через points.js для гибкости
        if (typeof myPoints !== 'undefined') {
            myPoints.forEach(function(p, i) {
                var icon = L.divIcon({ className: 'day-marker', html: p.day ? p.day : (i+1), iconSize: [30, 30], iconAnchor: [15, 15] });
                var html = '<div style="text-align:center;"><b>'+p.title+'</b><p>'+p.desc+'</p>';
                if (p.link) html += '<a href="view.html?file='+p.link+'" target="_blank" style="display:block;background:#28a745;color:white;padding:5px;border-radius:10px;text-decoration:none;font-weight:bold;">Трек</a>';
                html += '</div>';
                L.marker([p.lat, p.lng], {icon: icon}).addTo(map).bindPopup(html);
            });
            var last = myPoints[myPoints.length - 1];
            map.setView([last.lat, last.lng], 8);
        }
    </script>
</body>
</html>
