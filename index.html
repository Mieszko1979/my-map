<!DOCTYPE html>
<html>
<head>
    <title>Карта путешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Подключаем ваш файл с точками -->
    <script src="points.js"></script>

    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        #map { width: 100vw; height: 100vh; background: #f8f9fa; }
        
        /* Стиль всплывающего окна */
        .my-popup { font-family: sans-serif; font-size: 14px; text-align: center; line-height: 1.4; }
        .my-popup b { font-size: 16px; color: #333; }
        .my-popup a { 
            display: inline-block; margin-top: 10px; padding: 8px 15px;
            background: #238aff; color: white; text-decoration: none; 
            border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Инициализация карты (центр пока любой, мы его сместим позже)
        var map = L.map('map').setView([50, 80], 4);

        // 2. Красивая светлая подложка
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        // 3. Рисуем точки из файла points.js
        if (typeof myPoints !== 'undefined' && myPoints.length > 0) {
            
            myPoints.forEach(function(point) {
                var marker = L.marker([point.lat, point.lng]).addTo(map);
                
                var btnText = point.service ? point.service : "Открыть трек";
                
                var content = `
                    <div class="my-popup">
                        <b>${point.title}</b><br>
                        ${point.desc}<br>
                        <a href="${point.link}" target="_blank">${btnText}</a>
                    </div>`;
                
                marker.bindPopup(content);
                // МЫ УБРАЛИ mouseover, теперь окно открывается только по клику
            });

            // 4. МАГИЯ: Авто-фокус на последнюю добавленную точку
            // Берем координаты самой последней точки из списка
            var latestPoint = myPoints[myPoints.length - 1];
            
            // Сдвигаем карту к этой точке и ставим масштаб 10 (регион вокруг)
            map.setView([latestPoint.lat, latestPoint.lng], 10);

        } else {
            console.log("Точки не найдены в points.js");
        }

    </script>
</body>
</html>
