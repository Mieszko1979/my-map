<!DOCTYPE html>
<html>
<head>
    <title>Карта велопутешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="points.js"></script>
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        
        /* Базовый стиль кружка */
        .day-marker {
            background: #fff; border: 2px solid #28a745; border-radius: 50%;
            color: #000; font-weight: bold; font-family: Arial;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            font-size: 11px; /* Шрифт 11 как просили */
            overflow: hidden; /* Обрезает всё, что не влезает в круг */
            white-space: nowrap; /* Не дает тексту переноситься */
        }

        /* Если это ОДИНОЧНЫЙ день — центрируем */
        .day-marker.single { justify-content: center; }

        /* Если это ДИАПАЗОН (например 24-27) — прижимаем к левому краю с отступом, 
           чтобы первая цифра была по центру */
        .day-marker.range { 
            justify-content: flex-start; 
            padding-left: 7px; /* Отступ, чтобы "24" из "24-27" было в центре круга 30px */
        }

        .popup-box { text-align: center; font-family: sans-serif; min-width: 180px; }
        .popup-box b { font-size: 16px; display: block; margin-bottom: 5px; color: #333; }
        .popup-box p { margin: 8px 0; color: #666; font-size: 14px; }
        .btn-row { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn { text-decoration: none; font-weight: bold; font-size: 13px; padding: 6px 12px; border-radius: 15px; display: inline-block; }
        .btn-track { background: #28a745; color: white !important; }
        .btn-vk { background: #ffffff; color: #0077FF !important; border: 1px solid #0077FF; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {zoomControl: false, attributionControl: true}).setView([50, 80], 4);
        map.attributionControl.setPrefix('Мое велопутешествие');
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '' }).addTo(map);

        if (typeof myPoints !== 'undefined' && myPoints.length > 0) {
            myPoints.forEach(function(p, i) {
                var displayDay = String(p.day ? p.day : (i + 1));
                
                // Проверяем, есть ли в номере дня тире (диапазон)
                var isRange = displayDay.includes('-');
                var markerClass = isRange ? 'day-marker range' : 'day-marker single';

                var icon = L.divIcon({ 
                    className: markerClass, 
                    html: '<span>' + displayDay + '</span>', 
                    iconSize: [30, 30], 
                    iconAnchor: [15, 15] 
                });

                var html = '<div class="popup-box"><b>' + p.title + '</b><p>' + p.desc + '</p><div class="btn-row">';
                if (p.link && p.link !== "") {
                    html += '<a href="view.html?file=' + p.link + '" class="btn btn-track" target="_blank">Трек</a>';
                }
                if (p.vk && p.vk !== "") {
                    html += '<a href="' + p.vk + '" class="btn btn-vk" target="_blank">VK</a>';
                }
                html += '</div></div>';
                L.marker([p.lat, p.lng], {icon: icon}).addTo(map).bindPopup(html);
            });

            var last = myPoints[myPoints.length - 1];
            map.setView([last.lat, last.lng], 8);
        }
    </script>
</body>
</html>
