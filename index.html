<script>
    var map = L.map('map', {zoomControl: false, attributionControl: true}).setView([50, 80], 4);
    map.attributionControl.setPrefix('Мое велопутешествие');
    L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '' }).addTo(map);

    var currentTripLayer = L.layerGroup().addTo(map);
    var archiveLayerGroup = L.layerGroup().addTo(map);
    var photoLayerGroup = L.layerGroup().addTo(map);

    var colors = { 'c2018': '#ff0000', 'c2019': '#007bff', 'c2021': '#9b59b6', 'c2024': '#ff8c00', 'cCurrent': '#28a745' };

    function toggleList() {
        var showArchive = document.getElementById('main-toggle').checked;
        var list = document.getElementById('trip-list');
        if (showArchive) {
            list.style.display = 'block';
            map.removeLayer(currentTripLayer);
        } else {
            list.style.display = 'none';
            currentTripLayer.addTo(map);
            document.querySelectorAll('.trip-check').forEach(c => c.checked = false);
            // ПРИ ВЫКЛЮЧЕНИИ АРХИВА ГАЛОЧКУ ФОТО НЕ СНИМАЕМ, но чистим старые фото
            photoLayerGroup.clearLayers();
            archiveLayerGroup.clearLayers();
            closePhoto();
            updateMarkers(true); // Обновляем фото для текущего похода
            focusOnCurrent();
        }
    }

    function updateMarkers(onlyPhotos) {
        archiveLayerGroup.clearLayers();
        photoLayerGroup.clearLayers();
        var showPhotos = document.getElementById('photo-toggle').checked;
        var isArchiveMode = document.getElementById('main-toggle').checked;

        if (!showPhotos) { closePhoto(); }

        if (isArchiveMode) {
            // ЛОГИКА ДЛЯ АРХИВА
            if (document.getElementById('chk2018').checked) { 
                drawTrip(points2018, archiveLayerGroup, 'c2018', 'archive/2018/'); 
                if(showPhotos) loadExternalPhotos('archive-2018-photos', colors['c2018']);
            }
            if (document.getElementById('chk2019').checked) { 
                drawTrip(points2019, archiveLayerGroup, 'c2019', 'archive/2019/'); 
                if(showPhotos) loadExternalPhotos('archive-2019-photos', colors['c2019']);
            }
            if (document.getElementById('chk2021').checked) { 
                drawTrip(points2021, archiveLayerGroup, 'c2021', 'archive/2021/'); 
                if(showPhotos) loadExternalPhotos('archive-2021-photos', colors['c2021']);
            }
            if (document.getElementById('chk2024').checked) { 
                drawTrip(points2024, archiveLayerGroup, 'c2024', 'archive/2024/'); 
                if(showPhotos) loadExternalPhotos('archive-2024-photos', colors['c2024']);
            }
            
            if (!onlyPhotos) {
                var layers = archiveLayerGroup.getLayers();
                if (layers.length > 0) {
                    var group = new L.featureGroup(layers);
                    map.fitBounds(group.getBounds(), {padding: [50, 50]});
                }
            }
        } else {
            // ЛОГИКА ДЛЯ ТЕКУЩЕГО ПОХОДА
            if(showPhotos) loadExternalPhotos('trip-2026-photos', colors['cCurrent']);
        }
    }

    function drawTrip(data, targetLayer, colorClass, folder) {
        data.forEach(function(p, i) {
            var fullDay = String(p.day ? p.day : (i + 1));
            var parts = fullDay.split('-');
            var markerHtml = '<span class="num-wrapper">' + parts[0] + '<span class="suffix">' + (parts[1] ? '-' + parts[1] : '') + '</span></span>';
            var icon = L.divIcon({ className: 'day-marker ' + colorClass, html: markerHtml, iconSize: [24, 24], iconAnchor: [12, 12] });
            var html = '<div class="popup-box"><b>' + p.title + '</b><p>' + p.desc + '</p><div class="coords">' + p.lat.toFixed(5) + ', ' + p.lng.toFixed(5) + '</div><div class="btn-row">';
            if (p.link) html += '<a href="view.html?folder='+folder+'&file=' + p.link + '" class="btn btn-track" target="_blank">Трек</a>';
            if (p.vk) html += '<a href="' + p.vk + '" class="btn btn-vk" target="_blank">VK</a>';
            if (p.relive) html += '<a href="' + p.relive + '" class="btn btn-3d" target="_blank">3D</a>';
            html += '</div></div>';
            L.marker([p.lat, p.lng], {icon: icon}).addTo(targetLayer).bindPopup(html);
        });
    }

    function loadExternalPhotos(repoName, hexColor) {
        var jsonUrl = "https://mieszko1979.github.io/" + repoName + "/photos.json";
        fetch(jsonUrl).then(r => r.json()).then(data => {
            data.forEach(photo => {
                var svgIcon = `<svg class="cam-svg" width="30" height="30" viewBox="0 0 24 24" fill="${hexColor}"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><circle cx="12" cy="13" r="4" fill="white" opacity="0.3"/><circle cx="12" cy="13" r="3" fill="${hexColor}"/><circle cx="18" cy="7" r="1.5" fill="white"/></svg>`;
                var camIcon = L.divIcon({ className: 'photo-marker', html: svgIcon, iconSize: [30, 30], iconAnchor: [15, 15] });
                var fullPhotoUrl = "https://mieszko1979.github.io/" + repoName + "/" + photo.url;
                L.marker([photo.lat, photo.lng], {icon: camIcon}).addTo(photoLayerGroup).on('click', function() { showPhoto(fullPhotoUrl); });
            });
        }).catch(e => console.log("Фото для " + repoName + " пока не загружены"));
    }

    function showPhoto(url) { document.getElementById('view-img').src = url; document.getElementById('photo-viewer').style.display = 'block'; }
    function closePhoto() { document.getElementById('photo-viewer').style.display = 'none'; }
    function focusOnCurrent() { if (typeof myPoints !== 'undefined' && myPoints.length > 0) { var last = myPoints[myPoints.length - 1]; map.setView([last.lat, last.lng], 8); } }

    if (typeof myPoints !== 'undefined') {
        drawTrip(myPoints, currentTripLayer, 'cCurrent', 'tracks/');
        focusOnCurrent();
    }
</script>
