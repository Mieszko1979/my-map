<!DOCTYPE html>
<html>
<head>
    <title>Карта велопутешествия</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="points.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #f0f0f0; }
        .day-marker {
            background: #fff; border: 2px solid #007bff; border-radius: 50%;
            color: #007bff; font-weight: bold; font-family: sans-serif;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 13px;
        }
        .popup-box { text-align: center; font-family: sans-serif; min-width: 160px; }
        .popup-box b { font-size: 16px; display: block; margin-bottom: 5px; color: #333; }
        .popup-box p { margin: 8px 0; color: #666; font-size: 14px; }
        .btn-go {
            display: inline-block; background: #007bff; color: #fff !important;
            text-decoration: none; padding: 10px 30px; border-radius: 25px;
            margin-top: 10px; font-weight: bold; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([50, 80], 4);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        if (typeof myPoints !== 'undefined' && myPoints.length > 0) {
            myPoints.forEach(function(p, i) {
                var icon = L.divIcon({ className: 'day-marker', html: (i + 1), iconSize: [26, 26], iconAnchor: [13, 13] });

                // --- НОВЫЙ СПОСОБ СБОРКИ ССЫЛКИ ---
                // Берем чистый адрес сайта без index.html
                var loc = window.location.origin + window.location.pathname;
                if (!loc.endsWith('/')) loc += '/';
                
                // Полный путь к файлу GPX
                var fileUrl = loc + 'tracks/' + p.link;
                
                // Кодируем ссылку для gpx.studio (именно этот формат он понимает)
                var studioUrl = "https://gpx.studio/?state=" + encodeURIComponent(JSON.stringify({urls:[fileUrl]}));

                var popupHtml = '<div class="popup-box">' +
                               '<b>' + p.title + '</b>' +
                               '<p>' + p.desc + '</p>' +
                               '<a href="' + studioUrl + '" class="btn-go" target="_blank">Жми</a>' +
                               '</div>';

                L.marker([p.lat, p.lng], {icon: icon}).addTo(map).bindPopup(popupHtml);
            });

            var last = myPoints[myPoints.length - 1];
            map.setView([last.lat, last.lng], 8);
        }
    </script>
</body>
</html>
