<!DOCTYPE html>
<html>
<head>
    <title>Мой Велоархив</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- ПОДКЛЮЧАЕМ ДАННЫЕ -->
    <script src="points.js"></script>
    <script src="archive/2018/points.js"></script>
    <script src="archive/2019/points.js"></script>
    <script src="archive/2021/points.js"></script>
    <script src="archive/2024/points.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        
        #menu-box {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); font-family: sans-serif; min-width: 300px;
        }
        .menu-header { font-weight: bold; font-size: 16px; display: flex; align-items: center; cursor: pointer; color: #333; }
        .menu-header input { margin-right: 12px; transform: scale(1.3); }
        #trip-list { margin-top: 12px; padding-top: 12px; border-top: 1px solid #ccc; display: none; }
        
        .trip-item { margin-bottom: 12px; display: flex; align-items: center; font-size: 14px; font-weight: bold; }
        .trip-item input { margin-right: 12px; }

        /* ЦВЕТА */
        .c2018 { color: #ff0000; border-color: #ff0000 !important; }
        .c2019 { color: #007bff; border-color: #007bff !important; }
        .c2021 { color: #9b59b6; border-color: #9b59b6 !important; }
        .c2024 { color: #ff8c00; border-color: #ff8c00 !important; }
        .cCurrent { color: #28a745; border-color: #28a745 !important; }

        .day-marker {
            background: #fff; border-radius: 50%; border: 2.5px solid;
            color: #000; font-weight: bold; font-family: Arial;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5); font-size: 14px;
            overflow: hidden; white-space: nowrap;
        }
        .num-wrapper { position: relative; display: inline-block; line-height: 1; }
        .suffix { position: absolute; left: 100%; top: 0; }

        .popup-box { text-align: center; font-family: sans-serif; min-width: 170px; color: #333; }
        .popup-box p { margin: 5px 0; font-size: 14px; }
        
        /* Стиль для координат */
        .coords { font-size: 11px; color: #666; margin-bottom: 10px; font-family: monospace; }

        .btn-row { display: flex; justify-content: center; gap: 8px; margin-top: 5px; }
        .btn { text-decoration: none; font-weight: bold; font-size: 13px; padding: 6px 12px; border-radius: 15px; }
        .btn-track { background: #28a745; color: white !important; }
        .btn-vk { border: 1px solid #0077FF; color: #0077FF !important; background: white; }
    </style>
</head>
<body>

    <div id="menu-box">
        <div class="menu-header">
            <input type="checkbox" id="main-toggle" onchange="toggleList()"> Мои велопутешествия
        </div>
        <div id="trip-list">
            <div class="trip-item c2018"><input type="checkbox" class="trip-check" id="chk2018" onchange="updateMarkers()"> 1. Яранск - Паттайя (2018) - 9 476 км.</div>
            <div class="trip-item c2019"><input type="checkbox" class="trip-check" id="chk2019" onchange="updateMarkers()"> 2. Яранск - Иссык-Куль - Иран (2019) - 6 283 км.</div>
            <div class="trip-item c2021"><input type="checkbox" class="trip-check" id="chk2021" onchange="updateMarkers()"> 3. Яранск - Байкал (2021) - 4 793 км.</div>
            <div class="trip-item c2024"><input type="checkbox" class="trip-check" id="chk2024" onchange="updateMarkers()"> 4. Яранск - Афганистан - Армения (2024) - 7 137 км.</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map', {zoomControl: false, attributionControl: true}).setView([50, 80], 4);
        map.attributionControl.setPrefix('Мое велопутешествие');

        // Слой Гибрид Google
        L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains: ['mt0','mt1','mt2','mt3'], attribution: ''
        }).addTo(map);

        var currentTripLayer = L.layerGroup().addTo(map);
        var archiveLayerGroup = L.layerGroup().addTo(map);

        function toggleList() {
            var show = document.getElementById('main-toggle').checked;
            document.getElementById('trip-list').style.display = show ? 'block' : 'none';
            if (!show) {
                document.querySelectorAll('.trip-check').forEach(c => c.checked = false);
                updateMarkers();
            }
        }

        function drawTrip(data, targetLayer, colorClass, folder) {
            data.forEach(function(p, i) {
                var fullDay = String(p.day ? p.day : (i + 1));
                var parts = fullDay.split('-');
                var markerHtml = '<span class="num-wrapper">' + parts[0] + 
                                 '<span class="suffix">' + (parts[1] ? '-' + parts[1] : '') + '</span></span>';

                var icon = L.divIcon({ className: 'day-marker ' + colorClass, html: markerHtml, iconSize: [30, 30], iconAnchor: [15, 15] });
                
                // Собираем контент всплывающего окна
                var html = '<div class="popup-box">';
                html += '<b>' + p.title + '</b>';
                html += '<p>' + p.desc + '</p>';
                
                // --- ДОБАВЛЯЕМ КООРДИНАТЫ ---
                html += '<div class="coords">' + p.lat.toFixed(5) + ', ' + p.lng.toFixed(5) + '</div>';
                
                html += '<div class="btn-row">';
                if (p.link) html += '<a href="view.html?folder='+folder+'&file=' + p.link + '" class="btn btn-track" target="_blank">Трек</a>';
                if (p.vk) html += '<a href="' + p.vk + '" class="btn btn-vk" target="_blank">VK</a>';
                html += '</div></div>';

                L.marker([p.lat, p.lng], {icon: icon}).addTo(targetLayer).bindPopup(html);
            });
        }

        function updateMarkers() {
            archiveLayerGroup.clearLayers();
            var focusData = null;
            if (document.getElementById('chk2018').checked) { drawTrip(points2018, archiveLayerGroup, 'c2018', 'archive/2018/'); if(!focusData) focusData = points2018; }
            if (document.getElementById('chk2019').checked) { drawTrip(points2019, archiveLayerGroup, 'c2019', 'archive/2019/'); if(!focusData) focusData = points2019; }
            if (document.getElementById('chk2021').checked) { drawTrip(points2021, archiveLayerGroup, 'c2021', 'archive/2021/'); if(!focusData) focusData = points2021; }
            if (document.getElementById('chk2024').checked) { drawTrip(points2024, archiveLayerGroup, 'c2024', 'archive/2024/'); if(!focusData) focusData = points2024; }
            if (focusData) map.setView([focusData[0].lat, focusData[0].lng], 7);
            else focusOnCurrent();
        }

        function focusOnCurrent() {
            if (typeof myPoints !== 'undefined' && myPoints.length > 0) {
                var last = myPoints[myPoints.length - 1];
                map.setView([last.lat, last.lng], 8);
            }
        }

        if (typeof myPoints !== 'undefined') {
            drawTrip(myPoints, currentTripLayer, 'cCurrent', 'tracks/');
            focusOnCurrent();
        }
    </script>
</body>
</html>
