<!DOCTYPE html>
<html>
<head>
    <title>Детальная аналитика трека</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Карты и GPX -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    
    <!-- Графики -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; background: #000; overflow: hidden; }
        
        /* Карта занимает 70% высоты */
        #map { height: 70%; width: 100%; }
        
        /* График занимает 30% высоты */
        #chart-container { 
            height: 30%; width: 100%; background: white; 
            border-top: 2px solid #ccc; box-sizing: border-box; padding: 10px;
        }

        /* Панель аналитики справа */
        #info { 
            position: absolute; top: 15px; right: 15px; z-index: 1000; 
            background: rgba(255,255,255,0.9); padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 190px; line-height: 1.5;
        }
        .stat-item { margin-bottom: 10px; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; display: block; }
        .stat-val { font-weight: bold; color: #238aff; font-size: 16px; }
        .divider { border-bottom: 1px solid #ddd; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="info">
        <div class="divider">АНАЛИТИКА ДНЯ</div>
        
        <div class="stat-item">
            <span class="stat-label">Дистанция</span>
            <span id="dist" class="stat-val">0.0</span> <small>км</small>
        </div>

        <div class="stat-item">
            <span class="stat-label">Набор высоты</span>
            <span id="gain" class="stat-val">0</span> <small>м</small>
        </div>

        <div class="stat-item">
            <span class="stat-label">Макс. высота</span>
            <span id="max-alt" class="stat-val">0</span> <small>м</small>
        </div>

        <div class="stat-item">
            <span class="stat-label">Время в движении</span>
            <span id="time" class="stat-val">00:00</span>
        </div>

        <div class="stat-item">
            <span class="stat-label">Ср. скорость</span>
            <span id="avg-speed" class="stat-val">0.0</span> <small>км/ч</small>
        </div>
    </div>

    <div id="chart-container">
        <canvas id="elevationChart"></canvas>
    </div>

    <script>
        // Инициализация карты без флага
        var map = L.map('map', {attributionControl: true}).setView([50, 80], 5);
        map.attributionControl.setPrefix('Мое велопутешествие');

        // Спутник Google
        L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: ''
        }).addTo(map);

        var urlParams = new URLSearchParams(window.location.search);
        var fileName = urlParams.get('file');

        if (fileName) {
            new L.GPX('tracks/' + fileName, {
                async: true,
                marker_options: { startIconUrl: null, endIconUrl: null, shadowUrl: null },
                polyline_options: { color: '#ffea00', weight: 5, opacity: 0.9 }
            }).on('loaded', function(e) {
                var g = e.target;
                map.fitBounds(g.getBounds());

                // Наполнение аналитики
                document.getElementById('dist').innerText = (g.get_distance()/1000).toFixed(1);
                document.getElementById('gain').innerText = g.get_elevation_gain().toFixed(0);
                document.getElementById('max-alt').innerText = g.get_elevation_max().toFixed(0);
                document.getElementById('avg-speed').innerText = g.get_moving_speed().toFixed(1);
                
                // Время в пути
                var ms = g.get_moving_time();
                var hours = Math.floor(ms / 3600000);
                var mins = Math.floor((ms % 3600000) / 60000);
                document.getElementById('time').innerText = hours + "ч " + mins + "м";

                // Строим график
                buildChart(g.get_elevation_data());

            }).addTo(map);
        }

        function buildChart(data) {
            var ctx = document.getElementById('elevationChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d[0].toFixed(1)),
                    datasets: [{
                        label: 'Высота (м)',
                        data: data.map(d => d[1].toFixed(0)),
                        fill: true,
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        borderColor: '#28a745',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { title: { display: true, text: 'Дистанция (км)' }, ticks: { maxTicksLimit: 10 } },
                        y: { title: { display: true, text: 'Высота (м)' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
